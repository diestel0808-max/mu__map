<style>
:root{
  --bg:#f0ede8;--panel:#fff;--ink:#16161a;--ink2:#3a3a42;--soft:#8d8d96;
  --line:#e3e3e6;--line2:#d2d2d6;--chip:#f4f4f5;--accent:#b5202a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
button,input,textarea,select{font-family:inherit}

/* TOP BAR */
.app{max-width:440px;margin:0 auto;min-height:100vh;background:var(--bg)}
.topbar{position:sticky;top:0;z-index:20;background:rgba(240,237,232,.96);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);padding:14px 16px;display:flex;align-items:center;gap:12px}
.logo{font-family:'Space Mono',monospace;font-weight:700;font-size:16px;letter-spacing:.02em;flex:1;color:var(--ink)}
.logo .g{color:var(--soft)}
.ibtn{width:38px;height:38px;border-radius:12px;border:1px solid var(--line2);background:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:18px;transition:.15s}
.ibtn:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
.ibtn.solid{background:var(--ink);color:#fff;border-color:var(--ink)}

/* LIST */
.list{padding:12px 12px 100px;display:flex;flex-direction:column;gap:10px}
.empty{text-align:center;padding:80px 24px;color:var(--soft)}
.empty .ico{font-size:40px;margin-bottom:12px}
.empty .h{font-size:17px;font-weight:800;color:var(--ink);margin-bottom:6px}
.empty-btn{background:var(--ink);color:#fff;border:none;border-radius:12px;padding:12px 24px;font-weight:700;cursor:pointer;margin-top:14px}
.hcard{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 4px 14px -8px rgba(0,0,0,.2);
  display:flex;cursor:pointer;min-height:100px}
.hcard .poster{width:70px;flex-shrink:0;background:#23232c;position:relative}
.hcard .poster img{width:100%;height:100%;object-fit:cover;display:block}
.hcard .poster .nop{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.3);font-size:9px;font-family:'Space Mono',monospace;letter-spacing:.1em;text-align:center}
.hcard .stub{flex:1;padding:12px 14px;display:flex;flex-direction:column;gap:4px}
.hcard .s-title{font-weight:800;font-size:14px;letter-spacing:-.01em}
.hcard .s-info{font-size:12px;color:var(--ink2);line-height:1.5}
.hcard .s-cast{font-size:11px;color:var(--soft)}
.hcard .s-rating{font-size:11px;color:#e0a93b;margin-top:auto}
.slot{position:relative}
.slot .del{position:absolute;top:6px;right:6px;width:28px;height:28px;border-radius:50%;
  background:rgba(0,0,0,.75);color:#fff;border:none;cursor:pointer;font-size:14px;
  display:none;align-items:center;justify-content:center;z-index:5;line-height:1}
.editing .del{display:flex}
.editing .hcard{animation:wig .45s ease-in-out infinite}
@keyframes wig{0%,100%{transform:rotate(-.6deg)}50%{transform:rotate(.6deg)}}

/* SCREEN */
.screen{position:fixed;top:0;bottom:0;z-index:60;background:var(--bg);
  width:100%;max-width:440px;
  left:50%;transform:translateX(calc(-50% + 100vw));
  transition:transform .3s cubic-bezier(.3,.7,.2,1);
  overflow-y:auto;overflow-x:hidden;pointer-events:none}
.screen.open{transform:translateX(-50%);pointer-events:all}
@media(max-width:440px){
  .screen{left:0;transform:translateX(100%)}
  .screen.open{transform:translateX(0)}
}
.sbar{position:sticky;top:0;z-index:5;background:rgba(240,237,232,.96);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;padding:14px 16px}
.sbar .back{background:none;border:none;font-size:24px;cursor:pointer;width:32px;color:var(--ink);flex-shrink:0}
.sbar .t{font-size:17px;font-weight:800;letter-spacing:-.02em;flex:1}
.sbody{padding:16px 16px 80px}

/* STEPPER */
.stepper{display:flex;align-items:center;gap:4px;padding:14px 18px;background:rgba(240,237,232,.96);border-bottom:1px solid var(--line)}
.stp{display:flex;flex-direction:column;align-items:center;gap:4px}
.stp .dot{width:28px;height:28px;border-radius:50%;background:var(--chip);color:var(--soft);
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;
  border:1.5px solid var(--line2);transition:.2s}
.stp .nm{font-size:10px;color:var(--soft);font-weight:600}
.stp.cur .dot{background:var(--ink);color:#fff;border-color:var(--ink)}
.stp.cur .nm{color:var(--ink);font-weight:800}
.stp.done .dot{background:#fff;color:var(--ink);border-color:var(--ink)}
.stp.done .dot::before{content:"✓";font-size:13px}
.stpbar{flex:1;height:2px;background:var(--line2);border-radius:1px;margin-bottom:18px}

/* FORM */
.step-head{margin:4px 0 16px}
.step-head .sh-t{font-size:19px;font-weight:800;letter-spacing:-.02em}
.step-head .sh-s{font-size:12.5px;color:var(--soft);margin-top:4px}
.lab{font-size:13px;font-weight:800;letter-spacing:-.01em;color:var(--ink);margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.lab::before{content:"";width:4px;height:14px;background:var(--ink);border-radius:2px}
.f{margin-bottom:12px}
.f label{display:block;font-size:12px;color:var(--ink2);margin-bottom:6px;font-weight:600}
.f input,.f textarea,.f select{width:100%;font-size:14px;color:var(--ink);border:1px solid var(--line2);
  background:#fff;border-radius:10px;padding:10px 12px;transition:.15s}
.f input:focus,.f textarea:focus,.f select:focus{outline:none;border-color:var(--ink)}
.f textarea{resize:vertical;min-height:72px;line-height:1.5}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.g2 .f,.g3 .f{margin-bottom:0}

/* SHOOT ZONE */
.shoot{border:1.5px dashed var(--line2);border-radius:14px;background:#fff;padding:28px 16px;
  text-align:center;cursor:pointer;transition:.18s;margin-bottom:14px;position:relative}
.shoot:hover,.shoot.drag{border-color:var(--ink);background:#fafaf8}
.shoot .ic{font-size:32px;margin-bottom:6px}
.shoot .h{font-size:15px;font-weight:800}
.shoot .s{font-size:12px;color:var(--soft);margin-top:3px}
.shoot-preview{position:absolute;inset:0;border-radius:14px;overflow:hidden}
.shoot-preview img{width:100%;height:100%;object-fit:cover;opacity:.25}

/* OCR STATUS */
.ocr-wrap{min-height:20px;margin-bottom:8px}
.ocr{font-size:12.5px;font-weight:600;padding:8px 12px;border-radius:8px}
.ocr.loading{color:var(--ink);background:var(--chip)}
.ocr.done{color:#1a7a40;background:#e6f7ee}
.ocr.err{color:#c0392b;background:#ffebee}

/* KOPIS RESULT */
.kopis-box{margin:8px 0 12px}
.kopis-result{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px}
.kopis-result .kr-t{font-size:13px;font-weight:700;margin-bottom:8px}
.kopis-result .kr-row{font-size:12px;color:var(--soft);line-height:1.8}
.kopis-result .kr-row b{color:var(--ink);font-weight:600}
.kopis-apply{width:100%;margin-top:10px;background:var(--ink);color:#fff;border:none;
  border-radius:10px;padding:10px;font-weight:700;font-size:13px;cursor:pointer}

/* POSTER BOX */
.poster-box{border:1.5px dashed var(--line2);border-radius:12px;height:130px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  background:var(--chip);overflow:hidden;position:relative;margin-bottom:12px}
.poster-box:hover{border-color:var(--soft)}
.poster-box img{width:100%;height:100%;object-fit:cover}
.poster-box .pb-label{font-size:28px}

/* STARS */
.stars{display:flex;gap:6px;font-size:28px;margin-bottom:14px}
.stars span{cursor:pointer;opacity:.2;transition:.15s}
.stars span.on{opacity:1;color:#e0a93b}

/* EXTRAS */
.extras-wrap{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.extra-thumb{position:relative;width:62px;height:62px}
.extra-thumb img{width:62px;height:62px;object-fit:cover;border-radius:8px;border:1px solid var(--line)}
.extra-thumb .xbtn{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;
  background:var(--ink);color:#fff;border:none;cursor:pointer;font-size:12px;
  display:flex;align-items:center;justify-content:center}
.add-extra{width:62px;height:62px;border-radius:8px;border:1.5px dashed var(--line2);
  background:#fff;cursor:pointer;font-size:22px;color:var(--soft);display:flex;align-items:center;justify-content:center}

/* SWATCHES */
.swatches{display:flex;gap:9px;flex-wrap:wrap;align-items:center}
.sw{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;
  box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.5);transition:.12s}
.sw:hover{transform:scale(1.12)}.sw.sel{border-color:var(--ink)}
.sw-c{width:28px;height:28px;border-radius:50%;border:1.5px dashed var(--soft);cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:var(--soft);position:relative;overflow:hidden;font-size:14px}
.sw-c input{position:absolute;inset:0;opacity:0;cursor:pointer}

/* WIZ BUTTONS */
.wiz-foot{display:flex;gap:10px;margin-top:22px}
.wbtn{flex:1;border:1px solid var(--line2);background:#fff;color:var(--ink);
  font-weight:700;font-size:14px;border-radius:12px;padding:13px;cursor:pointer;transition:.15s}
.wbtn:hover{border-color:var(--ink)}
.wbtn.primary{background:var(--ink);color:#fff;border-color:var(--ink);flex:2}
.wbtn.primary:hover{background:#000}

/* DONE */
.done-wrap{text-align:center;padding:40px 20px 24px}
.done-check{width:72px;height:72px;border-radius:50%;background:var(--ink);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto 16px;
  animation:pop .4s cubic-bezier(.2,.8,.2,1)}
@keyframes pop{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}
.done-t{font-size:20px;font-weight:800;letter-spacing:-.02em}
.done-s{font-size:13px;color:var(--soft);margin-top:6px}

/* ── TICKET DESIGN ── */
/* 앞면: 포스터 온전하게, 텍스트 없음 */
.ticket-front{
  position:relative;width:100%;border-radius:18px;overflow:hidden;
  box-shadow:0 16px 40px -12px rgba(0,0,0,.5);
  background:var(--c,#1a1a2e);
  aspect-ratio:9/14;
}
.ticket-front .tf-poster{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.ticket-front .tf-noposter{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:rgba(255,255,255,.3);gap:8px
}
.ticket-front .tf-noposter .big{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.2em}
/* 티켓 찢는 선 */
.perf{position:absolute;left:0;right:0;height:14px;z-index:3;
  background:radial-gradient(circle 7px at 7px center,transparent 6px,var(--perf-bg,#f0ede8) 7px) left/14px 100% repeat-x}
.perf.top{top:-1px;--perf-bg:#f0ede8}
.perf.bot{bottom:-1px;transform:scaleY(-1);--perf-bg:#1a1a2e}

/* 뒷면: 아날로그 감성 */
.ticket-back{
  position:relative;width:100%;border-radius:18px;overflow:hidden;
  box-shadow:0 16px 40px -12px rgba(0,0,0,.5);
  background:linear-gradient(160deg,var(--c,#1a1a2e) 0%,#0d0d14 60%,#111118 100%);
  aspect-ratio:9/14;color:#fff;
  display:flex;flex-direction:column;
}
.tb-noise{
  position:absolute;inset:0;opacity:.04;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px
}
.tb-body{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;padding:18px 16px 14px}
.tb-head{font-family:'Space Mono',monospace;font-size:7.5px;letter-spacing:.12em;opacity:.5;
  display:flex;justify-content:flex-end;margin-bottom:12px}
.tb-divider{border:none;border-top:1px dashed rgba(255,255,255,.18);margin:10px 0}
.tb-title-block{margin-bottom:10px}
.tb-label{font-family:'Space Mono',monospace;font-size:7.5px;letter-spacing:.12em;opacity:.55;margin-bottom:4px;text-transform:uppercase}
.tb-title{font-family:'Nanum Myeongjo','Cormorant Garamond',serif;font-size:clamp(17px,4.5vw,22px);
  font-weight:800;line-height:1.1;letter-spacing:.02em;word-break:keep-all}
.tb-meta{display:grid;grid-template-columns:1fr 1fr;gap:4px 8px;font-size:10px;margin-bottom:6px}
.tb-meta-item .tb-label{margin-bottom:2px}
.tb-meta-item .tb-val{font-family:'Nanum Myeongjo',serif;font-size:11px;line-height:1.4}
.tb-seat-row{display:grid;grid-template-columns:1fr 1fr 1fr;border-top:1px dashed rgba(255,255,255,.18);
  border-bottom:1px dashed rgba(255,255,255,.18);margin:8px 0}
.tb-seat-cell{text-align:center;padding:8px 4px}
.tb-seat-cell:not(:last-child){border-right:1px dashed rgba(255,255,255,.18)}
.tb-seat-big{font-family:'Nanum Myeongjo',serif;font-weight:800;font-size:clamp(14px,4vw,18px);margin-top:2px;letter-spacing:.02em}
.tb-review-block{flex:1;display:flex;flex-direction:column;justify-content:flex-end}
.tb-review{font-family:'Gowun Batang',serif;font-size:10px;line-height:1.6;opacity:.85;
  font-style:italic;min-height:28px}
.tb-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.tb-rating{color:#e0a93b;font-size:14px;letter-spacing:2px}
.tb-no{font-family:'Space Mono',monospace;font-size:9px;opacity:.4;letter-spacing:.08em}

/* DETAIL / FLIP */
.dt-stage{padding:24px 20px 8px;display:flex;justify-content:center;
  background:repeating-linear-gradient(45deg,#e8e4de 0 10px,#f0ede8 10px 20px)}
.flip{perspective:1800px;width:62%;max-width:260px;cursor:pointer}
.flip-inner{position:relative;width:100%;aspect-ratio:9/14;
  transition:transform .75s cubic-bezier(.6,0,.2,1);transform-style:preserve-3d}
.flip.flipped .flip-inner{transform:rotateY(180deg)}
.flip .face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden}
.flip .face.back{transform:rotateY(180deg)}
.flip-hint{text-align:center;font-size:11px;color:var(--soft);font-family:'Space Mono',monospace;
  margin:8px 0 2px;letter-spacing:.04em}

/* DETAIL BODY */
.info-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:10px;border:1px solid var(--line)}
.info-card .ic-label{font-size:11px;font-weight:700;color:var(--soft);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.info-card .ic-val{font-size:14px;line-height:1.8;font-family:'Nanum Myeongjo',serif}
.review-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:10px;border:1px solid var(--line)}
.review-card .rc-stars{color:#e0a93b;font-size:18px;margin-bottom:8px}
.review-card .rc-text{font-family:'Gowun Batang',serif;font-size:14px;line-height:1.8;white-space:pre-wrap;color:var(--ink2)}
.photos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.photos-grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:10px;border:1px solid var(--line)}
.dt-btn{width:100%;background:#fff;border:1px solid var(--line2);border-radius:12px;
  padding:14px;font-weight:700;cursor:pointer;font-size:14px;margin-top:8px;transition:.15s;color:var(--ink)}
.dt-btn:hover{border-color:var(--ink)}
.dt-btn.danger{color:var(--accent)}

/* SETTINGS */
.set-section{background:#fff;border-radius:12px;border:1px solid var(--line);margin-bottom:12px;overflow:hidden}
.set-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--line)}
.set-row:last-child{border-bottom:none}
.set-row .ico{font-size:18px;width:26px;text-align:center;flex-shrink:0}
.set-row .txt{flex:1}
.set-row .rt{font-size:14px;font-weight:600}
.set-row .rs{font-size:11.5px;color:var(--soft);margin-top:2px}
.set-row input[type=text],.set-row input[type=password]{flex:1;border:1px solid var(--line2);border-radius:8px;padding:8px 11px;font-size:13px}
.set-row input:focus{outline:none;border-color:var(--ink)}
.set-row .save-key{background:var(--ink);color:#fff;border:none;border-radius:8px;
  padding:8px 12px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.set-badge{font-size:11px;padding:3px 9px;border-radius:999px;font-weight:700}
.set-badge.ok{background:#e6f7ee;color:#1a7a40}
.set-badge.no{background:#fef0f0;color:#c0392b}

/* INFO NOTICE */
.notice{background:#fffbe6;border:1px solid #f0d060;border-radius:10px;padding:12px 14px;font-size:12.5px;line-height:1.6;color:#6b5500;margin-bottom:14px}
.notice b{font-weight:700}
</style>

function simScore(a,b){
  a=(a||'').replace(/\s/g,'').toLowerCase();b=(b||'').replace(/\s/g,'').toLowerCase();
  if(!a||!b)return 0;if(a===b)return 1;if(a.includes(b)||b.includes(a))return .9;
  let m=0;for(const c of b)if(a.includes(c))m++;return m/Math.max(a.length,b.length);
}
async function kopisSearch(title,date){
  // 장르 접두어 제거
  title=(title||'').replace(/^(뮤지컬|연극|콘서트|오페라|무용|클래식) /,'').trim();
  const d=(date||'').replace(/[.\-\/]/g,'').slice(0,8);
  let st,ed;
  if(d&&d.length>=4){const yr=d.slice(0,4);st=yr+'0101';ed=yr+'1231';}
  else{const yr=new Date().getFullYear();st=(yr-5)+'0101';ed=yr+'1231';}
  // shprfnm 없이 날짜로만 검색 → 공백 에러 방지
  const url=`/api/kopis?path=pblprfr&stdate=${st}&eddate=${ed}&rows=100`;
  console.log('[KOPIS] 검색:', url);
  try{
    const res=await fetch(url);
    const raw=await res.text();
    console.log('[KOPIS] 응답 원문 (처음 500자):', raw.slice(0,500));
    const xml=new DOMParser().parseFromString(raw,'text/xml');
    const items=[...xml.querySelectorAll('db')];
    console.log('[KOPIS] 결과 수:', items.length);
    if(!items.length){
      // shprfnm 없이 재시도 (제목 글자별 검색)
      return await kopisSearchFallback(title,st,ed);
    }
    let best=null,bestSc=0;
    items.forEach(item=>{
      const nm=item.querySelector('prfnm')?.textContent||'';
      console.log('[KOPIS] 후보:', nm);
      const sc=simScore(nm,title);if(sc>bestSc){bestSc=sc;best=item;}
    });
    console.log('[KOPIS] 최고 유사도:', bestSc);
    if(!best||bestSc<0.2)return null;
    const mt=best.querySelector('mt20id')?.textContent;
    if(mt)return await kopisDetail(mt);
    return parseKopisItem(best);
  }catch(e){return null;}
}
async function kopisSearchFallback(title,st,ed){
  const kw=encodeURIComponent((title||'').slice(0,4));
  const url=`/api/kopis?path=pblprfr&stdate=${st}&eddate=${ed}&shprfnm=${kw}&rows=10`;
  console.log('[KOPIS fallback]:', url);
  try{
    const res=await fetch(url);
    const raw=await res.text();
    const xml=new DOMParser().parseFromString(raw,'text/xml');
    const items=[...xml.querySelectorAll('db')];
    console.log('[KOPIS fallback] 결과 수:', items.length);
    if(!items.length)return null;
    let best=null,bestSc=0;
    items.forEach(item=>{
      const nm=item.querySelector('prfnm')?.textContent||'';
      console.log('[KOPIS fallback] 후보:', nm);
      const sc=simScore(nm,title);if(sc>bestSc){bestSc=sc;best=item;}
    });
    if(!best||bestSc<0.15)return null;
    const mt=best.querySelector('mt20id')?.textContent;
    if(mt)return await kopisDetail(mt);
    return parseKopisItem(best);
  }catch(e){return null;}
}

async function loadPosterFromUrl(url){
  try{
    // KOPIS 이미지 CORS 차단 → 서버 프록시 경유
    const proxyUrl='/api/kopis?path=poster&url='+encodeURIComponent(url);
    const res=await fetch(proxyUrl);
    if(!res.ok)throw new Error('포스터 로드 실패');
    const blob=await res.blob();
    const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(blob);});
    draft.poster=b64;renderPosterBox();
  }catch(e){console.warn('포스터 로드 실패:',e);}
}

/* ── OCR ── */
async function runClaudeOCR(file){
  // 이미지 → base64
  const b64 = await new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=rej;
    r.readAsDataURL(file);
  });

  const timeout=new Promise((_,rej)=>setTimeout(()=>rej(new Error('타임아웃 (30초)')),30000));
  const fetchCall=fetch('/api/ocr',{
    method:'POST',
    headers:{'content-type':'application/json'},
    body:JSON.stringify({image:b64, mediaType:file.type||'image/jpeg'})
  });

  const res=await Promise.race([fetchCall, timeout]);
  if(!res.ok){
    const e=await res.json().catch(()=>({}));
    throw new Error(e.error||'서버 OCR 오류 '+res.status);
  }

  const obj=await res.json();
  console.log('[OCR] 결과:', obj);

  return obj;
}


async function runOCR(file){
  const st=$('#ocrStatus');
  st.className='ocr loading';st.textContent='📸 읽는 중…';
  // 사진 미리보기
  const url=URL.createObjectURL(file);
  const inner=$('#shootInner');
  inner.innerHTML=`<div class="shoot-preview"><img src="${url}"></div><div style="position:relative;z-index:1"><div class="ic">📸</div><div class="h" style="color:#fff">인식 중…</div></div>`;
  try{
    const f=await runClaudeOCR(file);
    const map={title:'#fTitle',date:'#fDate',time:'#fTime',venue:'#fVenue',floor:'#fFloor',row:'#fRow',seat:'#fSeat',cast:'#fCast'};
    const isEmpty=v=>!v||/^(n\/a|na|없음|미확인|모름|unknown|none|--|-)$/i.test(v.trim());
    Object.entries(map).forEach(([k,sel])=>{if(f[k]&&!isEmpty(f[k])&&$(sel))$(sel).value=f[k];});
    if(f.type){
      if(/뮤지컬/i.test(f.type))$('#fType').value='뮤지컬';
      else if(/연극/i.test(f.type))$('#fType').value='연극';
    }
    const n=Object.values(f).filter(Boolean).length;
    if(n>0){
      st.className='ocr done';st.textContent='✓ '+n+'개 항목 인식 완료. 다음 단계에서 정보를 확인해 주세요.';
    }else{
      st.className='ocr err';st.textContent='⚠️ 인식하지 못했어요. 다음 단계에서 직접 입력해 주세요.';
    }
    setTimeout(()=>tryKopis(),300);
  }catch(e){
    st.className='ocr err';st.textContent='⚠️ 일부만 인식됐어요. 다음 단계에서 직접 입력해 주세요.';
    setTimeout(()=>gotoStep(2),2000);
  }
}

        <div class="tb-meta-item"><div class="tb-label">Time</div><div class="tb-val">${esc(t.time||'—')}</div></div>
        <div class="tb-meta-item" style="grid-column:1/-1"><div class="tb-label">Venue</div><div class="tb-val">${esc(t.venue||'—')}</div></div>
        ${cast.length?`<div class="tb-meta-item" style="grid-column:1/-1"><div class="tb-label">Cast</div><div class="tb-val">${cast.slice(0,4).map(esc).join(', ')}</div></div>`:''}
      </div>
      <div class="tb-seat-row">
        <div class="tb-seat-cell"><div class="tb-label">Floor</div><div class="tb-seat-big">${esc(t.floor||'–')}</div></div>
        <div class="tb-seat-cell"><div class="tb-label">Row</div><div class="tb-seat-big">${esc(t.row||'–')}</div></div>
        <div class="tb-seat-cell"><div class="tb-label">Seat</div><div class="tb-seat-big">${esc(t.seat||'–')}</div></div>
      </div>
      <div class="tb-review-block">
        ${t.review?`<div class="tb-review">"${esc(t.review)}"</div>`:''}
        <div class="tb-footer">
          <div class="tb-rating">${t.rating?'★'.repeat(t.rating):''}</div>
          <div class="tb-no">${esc(t.type||'공연')}</div>
        </div>
      </div>
    </div>
  </div>`;
}

/* ── RENDER ── */
function render(){
  const list=$('#list');
  if(!tickets.length){
    list.innerHTML=`<div class="empty"><div class="ico">🎟️</div><div class="h">아직 비어 있는 티켓북</div><div>첫 무대를 기록해 보세요</div><button class="empty-btn" id="firstBtn">+ 첫 티켓 만들기</button></div>`;
    $('#firstBtn').onclick=openCreate;return;
  }
  list.className='list'+(editing?' editing':'');
  list.innerHTML='';
  [...tickets].reverse().forEach(t=>{
    const cast=castArr(t.cast);
    const slot=document.createElement('div');slot.className='slot';
    slot.innerHTML=`
      <div class="hcard" data-id="${t.id}">
        <div class="poster">${t.poster?`<img src="${t.poster}" alt="">`:'<div class="nop">NO<br>IMG</div>'}</div>
        <div class="stub">
          <div class="s-title">${esc(t.title||'제목 없음')}</div>
          <div class="s-info">${esc(t.date||'')}${t.time?' · '+esc(t.time):''}${t.venue?'<br>'+esc(t.venue):''}</div>
          ${cast.length?`<div class="s-cast">${cast.slice(0,3).map(esc).join(' · ')}</div>`:''}
          ${t.rating?`<div class="s-rating">${'★'.repeat(t.rating)}</div>`:''}
        </div>
      </div>
      <button class="del" data-id="${t.id}">−</button>`;
    slot.querySelector('.hcard').addEventListener('click',()=>{if(!editing)openDetail(t.id);});
    const delBtn=slot.querySelector('.del');
    delBtn.addEventListener('click',e=>{
      e.stopPropagation();
      if(delBtn.dataset.confirm==='1'){removeT(t.id);}
      else{delBtn.dataset.confirm='1';delBtn.textContent='✓';delBtn.style.background='#c0392b';
        setTimeout(()=>{delBtn.dataset.confirm='';delBtn.textContent='−';delBtn.style.background='rgba(0,0,0,.75)';},2000);}
    });
    list.appendChild(slot);
  });
}

/* ── EDITOR ── */
function freshDraft(){
  // 매번 완전히 새로운 draft 객체 — 이전 티켓 포스터 등이 절대 남지 않음
  return{color:PALETTE[0],rating:0,poster:null,extras:[]};
}
function openCreate(){
  editId=null;
  draft=freshDraft();
  clearForm();
  $('#edTitle').textContent='새 티켓';
  $('#ocrStatus').className='';$('#ocrStatus').textContent='';
  $('#shootInner').innerHTML='<div class="ic">📷</div><div class="h">티켓 사진 선택</div><div class="s">글자가 잘 보이게 찍으면 더 정확해요</div>';
  $('#kopisBox').innerHTML='';
  gotoStep(1);
  $('#editor').classList.add('open');
}
function openEdit(id){
  const t=tickets.find(x=>x.id===id);if(!t)return;
  editId=id;
  // 기존 티켓 데이터로 draft 초기화 (깊은 복사)
  draft={color:t.color||PALETTE[0],rating:t.rating||0,poster:t.poster||null,extras:[...(t.extras||[])]};
  fillForm(t);
  $('#edTitle').textContent='티켓 수정';
  $('#ocrStatus').className='';$('#ocrStatus').textContent='';
  $('#kopisBox').innerHTML='';
  gotoStep(2);// 수정 시 바로 정보 확인 단계로
  renderPosterBox();
  $('#editor').classList.add('open');
}
function closeEditor(){$('#editor').classList.remove('open');}
function clearForm(){['fTitle','fVenue','fDate','fTime','fFloor','fRow','fSeat','fCast','fReview'].forEach(id=>$(('#'+id)).value='');$('#fType').value='뮤지컬';}
function fillForm(t){
  $('#fTitle').value=t.title||'';$('#fVenue').value=t.venue||'';$('#fDate').value=t.date||'';
  $('#fTime').value=t.time||'';$('#fFloor').value=t.floor||'';$('#fRow').value=t.row||'';
  $('#fSeat').value=t.seat||'';$('#fCast').value=t.cast||'';$('#fReview').value=t.review||'';
  $('#fType').value=t.type||'뮤지컬';
}

function gotoStep(n){
  [1,2,3,4].forEach(i=>{const el=$('#step'+i);if(el)el.style.display=i===n?'block':'none';});
  document.querySelectorAll('.stp').forEach(el=>{
    const s=+el.dataset.s;
    el.classList.toggle('cur',s===n);
    el.classList.toggle('done',s<n);
    // done 상태는 CSS ::before 로 ✓ 표시 — textContent 비우면 안됨
    el.querySelector('.dot').textContent=s<n?'':s;
  });
  if(n===2){renderSwatches();renderPosterBox();}
  if(n===3){renderStars();renderExtras();}
}

function renderSwatches(){
  const wrap=$('#swatches');wrap.innerHTML='';
  PALETTE.forEach(c=>{
    const s=document.createElement('div');s.className='sw'+(draft.color===c?' sel':'');
    s.style.background=c;s.onclick=()=>{draft.color=c;renderSwatches();};wrap.appendChild(s);
  });
  const lbl=document.createElement('label');lbl.className='sw-c';lbl.innerHTML='＋<input type="color">';
  lbl.querySelector('input').oninput=e=>{draft.color=e.target.value;renderSwatches();};wrap.appendChild(lbl);
}
function renderStars(){
  document.querySelectorAll('#stars span').forEach(st=>st.classList.toggle('on',+st.dataset.v<=draft.rating));
}
function renderPosterBox(){
  const box=$('#posterBox');if(!box)return;
  box.innerHTML='';
  if(draft.poster){
    const img=document.createElement('img');img.src=draft.poster;img.alt='';box.appendChild(img);
    const inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.hidden=true;
    box.appendChild(inp);
    box.onclick=()=>inp.click();
    inp.onchange=async e=>{if(e.target.files[0]){draft.poster=await fileURL(e.target.files[0]);renderPosterBox();}};
  }else{
    const lbl=document.createElement('span');lbl.className='pb-label';lbl.textContent='🖼';box.appendChild(lbl);
    const inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.hidden=true;
    box.appendChild(inp);
    box.onclick=()=>inp.click();
    inp.onchange=async e=>{if(e.target.files[0]){draft.poster=await fileURL(e.target.files[0]);renderPosterBox();}};
  }
}
function renderExtras(){
  const wrap=$('#extras');wrap.innerHTML='';
  draft.extras.forEach((p,i)=>{
    const d=document.createElement('div');d.className='extra-thumb';
    d.innerHTML=`<img src="${p}" alt=""><button class="xbtn">×</button>`;
    d.querySelector('.xbtn').onclick=()=>{draft.extras.splice(i,1);renderExtras();};wrap.appendChild(d);
  });
  const add=document.createElement('button');add.className='add-extra';add.textContent='＋';
  add.onclick=()=>$('#extraPhoto').click();wrap.appendChild(add);
  $('#extraPhoto').onchange=async e=>{
    for(const f of e.target.files)draft.extras.push(await fileURL(f));
    renderExtras();e.target.value='';
  };
}
function fileURL(file,maxW=900){
  return new Promise((res,rej)=>{
    const img=new Image();const r=new FileReader();
    r.onload=()=>img.src=r.result;r.onerror=rej;
    img.onload=()=>{
      const sc=Math.min(1,maxW/img.width);const c=document.createElement('canvas');
      c.width=img.width*sc;c.height=img.height*sc;c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      res(c.toDataURL('image/jpeg',0.82));
    };r.readAsDataURL(file);
  });
}
async function save(){
  const t={
    id:editId||uid(),
    title:$('#fTitle').value.trim(),type:$('#fType').value,
    venue:$('#fVenue').value.trim(),cast:$('#fCast').value.trim(),
    date:$('#fDate').value.trim(),time:$('#fTime').value.trim(),
    floor:$('#fFloor').value.trim(),row:$('#fRow').value.trim(),seat:$('#fSeat').value.trim(),
    review:$('#fReview').value.trim(),rating:draft.rating,
    color:draft.color,poster:draft.poster,extras:[...draft.extras],
    ts:editId?(tickets.find(x=>x.id===editId)?.ts||Date.now()):Date.now()
  };
  if(!t.title){
    const ti=$('#fTitle');
    ti.style.border='1.5px solid #c0392b';
    ti.placeholder='공연명을 입력해 주세요';
    ti.focus();
    return;
  }
  try{
    if(editId){const i=tickets.findIndex(x=>x.id===editId);if(i!==-1)tickets[i]=t;}
    else tickets.push(t);
    try{await persist(t);}catch(e){console.warn('persist 실패(무시):', e);}
    render();
    gotoStep(4);
  }catch(e){
    console.error('save 오류:', e);
  }
}

/* ── DETAIL ── */
function openDetail(id){
  const t=tickets.find(x=>x.id===id);if(!t)return;
  $('#dtName').textContent=t.title||'티켓';
  $('#faceFront').innerHTML=frontHTML(t);
  $('#faceBack').innerHTML=backHTML(t);
  $('#flipCard').classList.remove('flipped');
  const cast=castArr(t.cast);
  $('#dtBody').innerHTML=`
    <div class="info-card">
      <div class="ic-label">공연 정보</div>
      <div class="ic-val">
        <b>${esc(t.title||'—')}</b><br>
        ${t.type?esc(t.type)+' · ':''}${esc(t.venue||'—')}<br>
        ${esc(t.date||'')}${t.time?' '+esc(t.time):''}
        ${t.floor||t.row||t.seat?`<br>${[t.floor,t.row,t.seat].filter(Boolean).map(esc).join(' ')}`:''}
        ${cast.length?`<br>캐스팅: ${cast.map(esc).join(', ')}`:''}
      </div>
    </div>
    ${t.rating||t.review?`<div class="review-card">
      ${t.rating?`<div class="rc-stars">${starStr(t.rating)}</div>`:''}
      ${t.review?`<div class="rc-text">${esc(t.review)}</div>`:''}
    </div>`:''}
    ${t.extras&&t.extras.length?`<div class="photos-grid">${t.extras.map(p=>`<img src="${p}" alt="">`).join('')}</div>`:''}
    <button class="dt-btn" id="dtEditBody">✎ 수정하기</button>
    <button class="dt-btn danger" id="dtDelBody">× 삭제하기</button>`;
  $('#dtEditBody').onclick=()=>{closeDetail();openEdit(id);};
  const dtDel=$('#dtDelBody');
  dtDel.onclick=()=>{
    if(dtDel.dataset.confirm==='1'){closeDetail();removeT(id);}
    else{dtDel.dataset.confirm='1';dtDel.textContent='정말 삭제할까요? 다시 누르면 삭제됩니다';dtDel.style.background='#fff0f0';
      setTimeout(()=>{dtDel.dataset.confirm='';dtDel.textContent='× 삭제하기';dtDel.style.background='';},2500);}
  };
  $('#dtEditBtn').onclick=()=>{closeDetail();openEdit(id);};
  $('#detail').classList.add('open');
}

function closeDetail(){$('#detail').classList.remove('open');}

/* ── EVENTS ── */
$('#newBtn').onclick=openCreate;
$('#edBack').onclick=closeEditor;
$('#cancelBtn').onclick=closeEditor;
$('#back1Btn').onclick=()=>gotoStep(1);
$('#back2Btn').onclick=()=>gotoStep(2);
$('#to3Btn').onclick=()=>{if(!$('#fTitle').value.trim()){const ti=$('#fTitle');ti.style.border='1.5px solid #c0392b';ti.focus();return;}gotoStep(3);};
$('#edSaveBtn').onclick=save;
$('#doneBtn').onclick=()=>{closeEditor();editing=false;$('#editPillBtn').classList.remove('solid');};
$('#dtBack').onclick=closeDetail;
$('#flipCard').addEventListener('click',()=>$('#flipCard').classList.toggle('flipped'));

// 사진 업로드
const shoot=$('#shoot'),tp=$('#ticketPhoto');
shoot.addEventListener('click',e=>{if(e.target.closest('input'))return;tp.click();});
tp.onchange=e=>{if(e.target.files[0])runOCR(e.target.files[0]);};
['dragover','dragenter'].forEach(ev=>shoot.addEventListener(ev,e=>{e.preventDefault();shoot.classList.add('drag');}));
['dragleave','drop'].forEach(ev=>shoot.addEventListener(ev,e=>{e.preventDefault();shoot.classList.remove('drag');}));
shoot.addEventListener('drop',e=>{const f=e.dataTransfer.files[0];if(f)runOCR(f);});

// step1 → step2
$('#to2Btn').onclick=()=>{gotoStep(2);if($('#fTitle').value.trim())tryKopis();};

// 별점
document.querySelectorAll('#stars span').forEach(st=>{
  st.onclick=()=>{draft.rating=(+st.dataset.v===draft.rating)?0:+st.dataset.v;renderStars();};
});

// 편집 모드
$('#editPillBtn').onclick=()=>{editing=!editing;$('#editPillBtn').classList.toggle('solid',editing);render();};






// 구글 로그인 버튼
document.getElementById('googleLoginBtn').onclick = signInWithGoogle;
document.getElementById('logoutBtn').onclick = signOut;

// 초기화 (인증은 onAuthStateChange에서 처리)
</script>
